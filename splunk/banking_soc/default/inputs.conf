# ──────────────────────────────────────────────────────────────────────────────
# Banking SOC Training — Splunk inputs
# Monitor all three synthetic log sources.
# followTail=0 ensures pre-existing files are indexed from the beginning.
# ──────────────────────────────────────────────────────────────────────────────

[monitor:///var/log/banking_soc/web_access.log]
index      = banking_soc
sourcetype = access_combined
disabled   = false
followTail = 0

[monitor:///var/log/banking_soc/transaction.log]
index      = banking_soc
sourcetype = banking_transaction
disabled   = false
followTail = 0

[monitor:///var/log/banking_soc/windows_auth.log]
index      = banking_soc
sourcetype = windows_auth_training
disabled   = false
followTail = 0
