# ──────────────────────────────────────────────────────────────────────────────
# Sourcetype definitions for Banking SOC Training logs
# ──────────────────────────────────────────────────────────────────────────────

# web_access.log — Apache Combined Log Format (built-in Splunk sourcetype)
# No extra stanza needed; Splunk handles access_combined natively.

# ─────────────────────────────────────────────────────────────────────────────
[banking_transaction]
# Pipe-delimited key=value log; timestamp at position 0
TIME_FORMAT          = %Y-%m-%d %H:%M:%S
TIME_PREFIX          = ^
MAX_TIMESTAMP_LOOKAHEAD = 19
KV_MODE              = auto
SHOULD_LINEMERGE     = false

# ─────────────────────────────────────────────────────────────────────────────
[windows_auth_training]
# Space-delimited key=value Windows security event log
TIME_FORMAT          = %Y-%m-%d %H:%M:%S
TIME_PREFIX          = ^
MAX_TIMESTAMP_LOOKAHEAD = 19
KV_MODE              = auto
SHOULD_LINEMERGE     = false
