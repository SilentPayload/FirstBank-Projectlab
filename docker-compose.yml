version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# FirstBank Nigeria SOC Training - Docker Compose
#
# DISCLAIMER: Entirely synthetic training environment.
#
# Usage:
#   1.  Copy .env.example to .env and set STUDENT_SEED and SPLUNK_PASSWORD.
#   2.  docker compose up --build
#   3.  Wait ~90 s for Splunk to start, then open http://localhost:8000
#       Login: admin / <your SPLUNK_PASSWORD>
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Step 1: generate synthetic logs ─────────────────────────────────────────
  log-generator:
    build:
      context: ./data-generator
    environment:
      STUDENT_SEED: ${STUDENT_SEED:-12345}
      OUTPUT_DIR:   /output
    volumes:
      - logs_data:/output
    restart: "no"

  # ── Step 2: Splunk ingests those logs ────────────────────────────────────────
  splunk:
    image: splunk/splunk:9.3.2
    depends_on:
      log-generator:
        condition: service_completed_successfully
    environment:
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_PASSWORD:   ${SPLUNK_PASSWORD:-Training123!}
    ports:
      - "8000:8000"   # Splunk Web UI
    volumes:
      # Synthetic logs written by the generator
      - logs_data:/var/log/banking_soc:ro
      # Splunk app with inputs.conf / props.conf
      - ./splunk/banking_soc:/opt/splunk/etc/apps/banking_soc
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000 > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 60s

volumes:
  logs_data:
